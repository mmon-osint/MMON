<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMON — Morpheus Monitoring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.1.2/gridstack.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- Login Modal -->
<div class="login-overlay" id="login-overlay">
    <div class="login-box">
        <div class="login-brand">◉ MMON</div>
        <div class="login-sub">Morpheus Monitoring Dashboard</div>
        <input type="text" class="login-input" id="login-user" placeholder="Username" autocomplete="username">
        <input type="password" class="login-input" id="login-pass" placeholder="Password" autocomplete="current-password">
        <button class="login-btn" onclick="MMON.login()">Login</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- App Grid -->
<div class="app-grid" id="app" style="display:none;">

    <!-- Sidebar -->
    <aside class="app-sidebar">
        <div class="sidebar-section">
            <h3>Severity</h3>
            <div class="severity-filters" id="sev-filters">
                <label class="sev-filter active" data-sev="critical">
                    <input type="checkbox" checked> <span class="sev sev-critical">CRIT</span>
                    <span class="sev-count" id="count-critical">0</span>
                </label>
                <label class="sev-filter active" data-sev="high">
                    <input type="checkbox" checked> <span class="sev sev-high">HIGH</span>
                    <span class="sev-count" id="count-high">0</span>
                </label>
                <label class="sev-filter active" data-sev="medium">
                    <input type="checkbox" checked> <span class="sev sev-medium">MED</span>
                    <span class="sev-count" id="count-medium">0</span>
                </label>
                <label class="sev-filter active" data-sev="low">
                    <input type="checkbox" checked> <span class="sev sev-low">LOW</span>
                    <span class="sev-count" id="count-low">0</span>
                </label>
                <label class="sev-filter active" data-sev="info">
                    <input type="checkbox" checked> <span class="sev sev-info">INFO</span>
                    <span class="sev-count" id="count-info">0</span>
                </label>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Source VM</h3>
            <select class="vm-select" id="vm-filter" onchange="MMON.applyFilters()">
                <option value="">All VMs</option>
                <option value="vm1">VM1 — Clearnet</option>
                <option value="vm2">VM2 — Deep Web</option>
                <option value="vm3">VM3 — Telegram</option>
            </select>
        </div>

        <div class="sidebar-section">
            <h3>Date Range</h3>
            <div class="date-inputs">
                <input type="date" id="date-from" onchange="MMON.applyFilters()">
                <input type="date" id="date-to" onchange="MMON.applyFilters()">
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Quick Stats</h3>
            <div class="quick-stats">
                <div class="stat-box">
                    <div class="stat-num" id="stat-findings">0</div>
                    <div class="stat-label">Findings</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-critical">0</div>
                    <div class="stat-label">Critical</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-tools">0</div>
                    <div class="stat-label">Active Tools</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-targets">0</div>
                    <div class="stat-label">Targets</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Header -->
    <header class="app-header">
        <div class="header-brand">◉ MMON <span>Dashboard</span></div>
        <div class="header-actions">
            <div class="header-status">
                <div class="status-dot" id="api-status-dot"></div>
                <span id="api-status-text">Connecting...</span>
            </div>
            <button class="btn btn-ghost" onclick="MMON.refreshAll()">↻ Refresh</button>
            <button class="btn btn-ghost" onclick="MMON.resetLayout()">⊞ Reset</button>
            <button class="btn btn-danger" onclick="MMON.logout()">Logout</button>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="app-main">
        <div class="grid-stack" id="grid"></div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.1.2/gridstack-all.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="js/widget-engine.js"></script>
<script src="js/widgets/social-footprint.js"></script>
<script src="js/widgets/infrastructure.js"></script>
<script src="js/widgets/cve-feed.js"></script>
<script src="js/widgets/keywords.js"></script>
<script src="js/widgets/competitors.js"></script>
<script src="js/widgets/status.js"></script>
<script src="js/widgets/bad-actors.js"></script>
<script src="js/widgets/criminal-forums.js"></script>
<script src="js/widgets/alerts.js"></script>
<script src="js/widgets/telegram-status.js"></script>
<script src="js/widgets/monitored-channels.js"></script>
</body>
</html>
