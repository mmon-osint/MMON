# ─────────────────────────────────────────────────────────────
# MMON — Apache2 VirtualHost
# Dashboard statica + Reverse proxy API (FastAPI) + Wizard PHP
# Copiare in /etc/apache2/sites-available/mmon.conf
# a2ensite mmon && systemctl reload apache2
# ─────────────────────────────────────────────────────────────

<VirtualHost *:80>
    ServerName mmon.local
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName mmon.local

    # ── SSL ──
    SSLEngine On
    SSLCertificateFile    /etc/ssl/certs/mmon.crt
    SSLCertificateKeyFile /etc/ssl/private/mmon.key
    SSLProtocol           -all +TLSv1.2 +TLSv1.3

    # ── Security Headers ──
    Header always set X-Frame-Options        "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection       "1; mode=block"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"

    # ── Dashboard statica ──
    DocumentRoot /opt/mmon/dashboard
    <Directory /opt/mmon/dashboard>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback
        FallbackResource /index.html
    </Directory>

    # Cache static assets
    <LocationMatch "^/(css|js)/">
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
        Header set Cache-Control "public, immutable"
    </LocationMatch>

    # ── API Reverse Proxy → FastAPI (Uvicorn :8000) ──
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # Health endpoint
    ProxyPass        /health http://127.0.0.1:8000/health
    ProxyPassReverse /health http://127.0.0.1:8000/health

    # ── Wizard PHP ──
    Alias /wizard /opt/mmon/wizard
    <Directory /opt/mmon/wizard>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php/php-fpm.sock|fcgi://localhost/"
        </FilesMatch>

        DirectoryIndex index.php
    </Directory>

    # ── Deny dotfiles ──
    <DirectoryMatch "^\.|\/\.">
        Require all denied
    </DirectoryMatch>

    # ── Logging ──
    ErrorLog  ${APACHE_LOG_DIR}/mmon-error.log
    CustomLog ${APACHE_LOG_DIR}/mmon-access.log combined
</VirtualHost>
