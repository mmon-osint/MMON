# ─────────────────────────────────────────────────────────────
# MMON — Nginx config: Dashboard + API reverse proxy
# Da copiare in /etc/nginx/sites-available/mmon-dashboard
# e symlink in /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name _;

    # ── SSL (self-signed o Let's Encrypt) ──
    ssl_certificate     /etc/ssl/certs/mmon.crt;
    ssl_certificate_key /etc/ssl/private/mmon.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/mmon/dashboard;
    index index.html;

    # ── Security headers ──
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Dashboard static files ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /css/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy → FastAPI (Uvicorn :8000) ──
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Rate limit aggiuntivo Nginx (opzionale, già gestito da slowapi)
        # limit_req zone=api burst=20 nodelay;
    }

    # ── Health endpoint (pubblico) ──
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ── Wizard PHP (porta separata, ma proxy se necessario) ──
    location /wizard {
        proxy_pass http://127.0.0.1:8080;
    }

    # ── Deny dotfiles ──
    location ~ /\. {
        deny all;
        return 404;
    }
}

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
